<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SAVE WITH TIMSON</h1>
      <span class="tagline">FIND DISCOUNT CODES AUTOMATICALLY</span>
    </div>

    <div id="store-info" class="store-card">
      <span class="dot detecting"></span>
      <span id="store-name">Detecting store...</span>
    </div>

    <div id="not-shopify" class="message-card hidden">
      <p>NOT A SHOPIFY CHECKOUT</p>
      <p class="hint">Navigate to a checkout page and try again.</p>
    </div>

    <div id="existing-discount" class="message-card info hidden">
      <p>Discount <strong id="existing-code"></strong> is already applied.</p>
      <p class="hint">Search for a better one?</p>
    </div>

    <div id="progress-section" class="hidden">
      <div class="progress-header">
        <span id="progress-phase"></span>
        <span id="progress-count"></span>
      </div>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="progress-code" class="progress-code"></div>
      <div id="progress-best" class="progress-best hidden">
        Best so far: <strong id="best-code"></strong> saves <strong id="best-amount"></strong>
      </div>
    </div>

    <div id="result-section" class="hidden">
      <div id="result-success" class="result-card success hidden">
        <div class="result-amount" id="result-amount"></div>
        <div class="result-text">
          SAVED WITH <strong id="result-code"></strong>
        </div>
        <div id="result-detail" class="result-detail"></div>
        <div class="wave-bottom"></div>
      </div>
      <div id="result-none" class="result-card none hidden">
        <div class="result-text">NO CODES FOUND</div>
        <div class="result-detail" id="result-tried"></div>
      </div>
    </div>

    <div class="actions">
      <button id="start-btn" class="btn primary" disabled>FIND CODES</button>
      <button id="cancel-btn" class="btn secondary hidden">STOP</button>
      <button id="continue-btn" class="btn secondary hidden">KEEP GOING (<span id="remaining-count"></span> MORE)</button>
    </div>

    <div id="sources-info" class="sources-info hidden">
      <div class="sources-title">SOURCES CHECKED</div>
      <div id="sources-list" class="sources-list"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
